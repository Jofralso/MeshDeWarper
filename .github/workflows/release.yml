name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test,qt,vision]"

      - name: Test
        run: QT_QPA_PLATFORM=offscreen python -m pytest tests/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build .curaplugin
        run: python scripts/build_curaplugin.py --version "${GITHUB_REF_NAME#v}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MeshDeWarper ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.curaplugin
